server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;

    # 允許最大 10MB 請求 body
    client_max_body_size 10M;

    # 建議將 debug 改為 info 或 warn，避免日誌過多
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log info;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理
    location /api/ {
        access_log /var/log/nginx/api_proxy.log;

        # 1. 縮短 DNS 解析快取時間 (從 300s 改為 10s)，確保能快速捕捉 Railway 內網 IP 變動
        resolver [fd12::10] valid=10s;

        proxy_pass "${BACKEND_URL}";

        # 2. 解決 "upstream sent too big header" 問題
        # 你的登入 Token 非常長，必須加大緩衝區以免 Nginx 報錯
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;

        # 3. 修正 Proxy Headers
        # 改用 $proxy_host (內網網址) 以避免 ASP.NET Core 因為 Host 不符而拒絕連線
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 告訴後端原始請求是 https，避免後端嘗試 HttpsRedirection
        proxy_set_header X-Forwarded-Proto "https";

        # 4. 移除不必要的 SSL 指令 (內網連線使用 http 協定)
        proxy_ssl_server_name off;

        # 5. 支援 WebSocket (保留)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 6. 優化超時設定
        # 縮短連線超時，若連不上立即重試或報錯，避免瀏覽器轉圈圈過久
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 當發生 502/504 時，嘗試重新解析並發送請求
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    }
}
